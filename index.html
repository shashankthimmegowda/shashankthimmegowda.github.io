<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Shashank Thimmegowda — Snowflake Data Engineer with 5+ years building ELT pipelines, dbt models, and Airflow orchestration at enterprise scale." />
    <meta name="author" content="Shashank Thimmegowda" />
    <meta name="keywords" content="Snowflake Data Engineer, dbt, Apache Airflow, Fivetran, ELT Pipeline, Data Engineering, SnowPro Certified" />
    <meta property="og:title" content="Shashank Thimmegowda | Snowflake Data Engineer" />
    <meta property="og:description" content="5+ years designing ELT pipelines on Snowflake. SnowPro Advanced Architect & Data Engineer certified." />
    <title>Shashank Thimmegowda | Snowflake Data Engineer</title>

    <!-- Google Fonts: Syne (display) + DM Sans (body) + JetBrains Mono (code) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body>

    <!-- Scroll Progress Bar -->
    <div class="scroll-progress" id="scrollProgress"></div>

    <!-- Navigation -->
    <nav class="navbar" id="navbar">
      <div class="container">
        <div class="nav-brand">
          <a href="#home" class="brand-mark"></a>
        </div>
        <button class="nav-toggle" id="navToggle" aria-label="Toggle menu">
          <span></span>
          <span></span>
          <span></span>
        </button>
        <ul class="nav-menu" id="navMenu">
          <!-- Populated by JS -->
        </ul>
      </div>
    </nav>

    <!-- Hero Section -->
    <section id="home" class="hero">
      <div class="hero-bg-aurora"></div>
      <div class="hero-bg-grid"></div>
      <div class="container">
        <div class="hero-layout">

          <!-- Left: Text -->
          <div class="hero-content">
            <p class="hero-greeting" id="heroGreeting"></p>
            <h1 class="hero-title">
              <span class="hero-name" id="heroName"></span>
            </h1>
            <div class="hero-role-wrap">
              <span class="hero-role-line"></span>
              <h2 class="hero-subtitle" id="heroTitle"></h2>
              <span class="hero-role-line"></span>
            </div>
            <p class="hero-description" id="heroSummary"></p>
            <div class="hero-highlights" id="heroHighlights"></div>
            <div class="hero-cta" id="heroCTA"></div>
            <div class="social-links" id="heroSocial"></div>
          </div>

          <!-- Right: Headshot -->
          <div class="hero-photo-wrap">
            <div class="hero-photo-ring">
              <div class="hero-photo-inner">
                <img
                  src="assets/images/headshot.jpg"
                  alt="Shashank Thimmegowda"
                  class="hero-photo"
                />
              </div>
            </div>
            <div class="hero-photo-badge">
              <i class="fas fa-certificate"></i>
              <span>4× SnowPro</span>
            </div>
          </div>

        </div>
      </div>
      <div class="hero-scroll-hint">
        <span>Scroll</span>
        <i class="fas fa-chevron-down"></i>
      </div>
    </section>

    <!-- About Section -->
    <section id="about" class="about">
      <div class="container">
        <h2 class="section-title"></h2>
        <div class="about-content">
          <div class="about-text" id="aboutText"></div>
          <div class="about-stats" id="aboutStats"></div>
        </div>
      </div>
    </section>

    <!-- Experience Section -->
    <section id="experience" class="experience">
      <div class="container">
        <h2 class="section-title"></h2>
        <div class="timeline" id="experienceTimeline"></div>
      </div>
    </section>

    <!-- Skills Section -->
    <section id="skills" class="skills">
      <div class="container">
        <h2 class="section-title"></h2>
        <div class="skills-grid" id="skillsGrid"></div>
      </div>
    </section>

    <!-- Projects Section -->
    <section id="projects" class="projects">
      <div class="container">
        <h2 class="section-title"></h2>
        <div class="projects-grid" id="projectsGrid"></div>
      </div>
    </section>

    <!-- Education Section -->
    <section id="education" class="education">
      <div class="container">
        <h2 class="section-title"></h2>
        <div class="education-content">
          <div class="education-grid" id="educationGrid"></div>
          <div class="certifications">
            <h3 class="cert-section-title"></h3>
            <div class="cert-grid" id="certGrid"></div>
          </div>
        </div>
      </div>
    </section>

    <!-- Contact Section -->
    <section id="contact" class="contact">
      <div class="container">
        <h2 class="section-title"></h2>
        <p class="contact-intro" id="contactIntro"></p>
        <div class="contact-content">
          <div class="contact-info" id="contactInfo"></div>
          <div class="contact-form-container" id="contactFormContainer"></div>
        </div>
      </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <div class="container">
        <p id="footerCopyright"></p>
        <div class="footer-links" id="footerLinks"></div>
      </div>
    </footer>

    <!-- Back to Top -->
    <button class="back-to-top" id="backToTop" aria-label="Back to top">
      <i class="fas fa-arrow-up"></i>
    </button>

    <script src="assets/js/main.js"></script>
  </body>
</html>
